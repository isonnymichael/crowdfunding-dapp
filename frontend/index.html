<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdFunding DApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        /* Loading Spinner */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

</head>

<body class="bg-gray-50 min-h-screen">
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="mt-4 text-blue-600 font-bold animate-pulse">Processing on Blockchain...</p>
    </div>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200 py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                CrowdFunding</h1>
            <div id="wallet-section">
                <button id="connect-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-all shadow-md">
                    Connect Wallet
                </button>
                <div id="account-info" class="hidden flex items-center space-x-2">
                    <span class="text-sm text-gray-600" id="account-address"></span>
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

        <!-- Campaigns List -->
        <section>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div class="flex items-center space-x-4">
                    <h2 class="text-3xl font-extrabold text-gray-900 border-l-4 border-blue-600 pl-4">Active Campaigns
                    </h2>
                    <button id="refresh-btn"
                        class="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center space-x-1">
                        <span>Refresh</span>
                    </button>
                </div>
                <button onclick="$('#launch-modal').removeClass('hidden')"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-2xl shadow-lg transition-all transform hover:scale-105 active:scale-95 text-sm">
                    + Launch New Campaign
                </button>
            </div>

            <div id="campaign-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Campaigns will be injected here -->
                <div class="col-span-full text-center py-20 text-gray-500 italic">No campaigns found yet...</div>
            </div>
        </section>

        <!-- Recent Activity Section -->
        <section class="mt-20">
            <h2 class="text-3xl font-extrabold text-gray-900 border-l-4 border-indigo-600 pl-4 mb-8">Recent Activity
            </h2>
            <div id="event-list" class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                <!-- Events will be injected here -->
                <div class="p-8 text-center text-gray-400 italic">Loading recent activity...</div>
            </div>
        </section>
    </main>


    <!-- Modal for actions -->
    <div id="modal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl transform transition-all scale-100">
            <h3 id="modal-title" class="text-2xl font-bold mb-4 text-gray-900">Pledge to Campaign</h3>
            <div id="modal-body" class="space-y-4">
                <input type="number" id="pledge-amount" placeholder="Amount in ETH" step="0.01"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                <button id="modal-submit"
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md">Submit</button>
            </div>
            <button onclick="$('#modal').addClass('hidden')"
                class="mt-4 w-full text-gray-500 hover:text-gray-700 font-medium font-bold">Cancel</button>
        </div>
    </div>

    <!-- Launch Modal -->
    <div id="launch-modal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] backdrop-blur-sm">
        <div
            class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl transform transition-all border border-gray-100">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Launch Your Campaign</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">Funding Goal (ETH)</label>
                    <input type="number" id="goal" placeholder="e.g. 5.5" step="0.01"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">Start Date</label>
                        <input type="datetime-local" id="startAt"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">End Date</label>
                        <input type="datetime-local" id="endAt"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    </div>
                </div>
                <button id="launch-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95">
                    Launch Campaign
                </button>
                <button onclick="$('#launch-modal').addClass('hidden')"
                    class="w-full text-gray-500 hover:text-gray-700 font-bold py-2 transition-all">
                    Cancel
                </button>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
